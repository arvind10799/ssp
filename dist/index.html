<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SSP Group homepage rebuilt in React with premium real estate presentation."
    />
    <meta name="theme-color" content="#031a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="S&S Properties" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/ssp-app-icon-192.png" />
    <link rel="apple-touch-icon" href="/assets/ssp-apple-touch-icon.png" />
    <script>
      (() => {
        const path = location.pathname.replace(/\/$/, "");
        const isMobile = matchMedia("(max-width: 720px)").matches;
        const href = path === "/projects/ar-belle-vie-phase-1"
          ? (isMobile ? "/images/Hero-Section-BG_1_mobile.webp" : "/images/Hero-Section-BG_1_opt.webp")
          : path === "/about-us"
            ? "/assets/about-hero-premium-residence.webp"
            : (isMobile ? "/assets/hero_bg-mobile.jpg" : "/assets/hero_bg-desktop.jpg");
        const link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.href = href;
        link.fetchPriority = "high";
        document.head.appendChild(link);
      })();
    </script>
    <style>
      #ar-static-boot {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        min-height: 100svh;
        overflow: hidden;
        color: #fff;
        background: #031a2e;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 280ms ease;
      }

      #ar-static-boot.is-hiding {
        opacity: 0;
        pointer-events: none;
      }

      #ar-static-boot img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #ar-static-boot::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(3, 26, 46, 0.44), rgba(3, 26, 46, 0.86)),
          linear-gradient(90deg, rgba(3, 26, 46, 0.52), rgba(3, 26, 46, 0.14) 58%);
      }

      .ar-static-copy {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 92px;
        z-index: 1;
        display: grid;
        gap: 10px;
      }

      .ar-static-copy span {
        color: #ff7200;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .ar-static-copy h1 {
        max-width: 360px;
        margin: 0;
        color: #fff;
        font-size: clamp(2.65rem, 14vw, 4.1rem);
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: 0;
      }
    </style>
    <title>SSP Group | Premium Real Estate</title>
    <script type="module" crossorigin src="/assets/index-C0qfgRTF.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C2mjsLHL.css">
  </head>
  <body>
    <script>
      (() => {
        const path = location.pathname.replace(/\/$/, "");
        if (path !== "/projects/ar-belle-vie-phase-1") return;

        const isMobile = matchMedia("(max-width: 720px)").matches;
        const image = isMobile ? "/images/Hero-Section-BG_1_mobile.webp" : "/images/Hero-Section-BG_1_opt.webp";
        document.write(`
          <div id="ar-static-boot" aria-label="AR Belle Vie Phase 1">
            <img src="${image}" alt="" width="390" height="844" fetchpriority="high" decoding="async" />
            <div class="ar-static-copy">
              <span>Premium villas near Whitefield</span>
              <h1>AR Belle Vie Phase 1</h1>
            </div>
          </div>
        `);
      })();
    </script>
    <div id="root"></div>
  </body>
</html>
